services:
  postgres:
    image: postgres:16-alpine
    container_name: freelancepact_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: freelancepact
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: freelancepact_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U freelancepact -d freelancepact_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
